workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-8        # 8 vCPU / 32GB / 1×L4
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 300
    containerSpec:
      # Pinned to a DIGEST at submit time by watch_job.sh. Vertex resolves a
      # ':latest' tag at container START — after a long Flex Start queue the
      # image could silently change between submit and run.
      imageUri: ${IMAGE_URI}
      # One GPU acquisition runs the baseline AND the sweep (see the script):
      # dvc pull -> CUDA check -> baseline fine-tune -> N-trial W&B sweep
      # -> by-subject eval of the sweep's best adapter.
      command: ["/bin/bash", "cloud/run_baseline_and_sweep.sh"]
      args:
        - data.batch_size=4
        - data.num_workers=4
      env:
        - name: SWEEP_COUNT
          value: "${SWEEP_COUNT}"
        - name: SKIP_BASELINE
          value: "${SKIP_BASELINE}"
        - name: SWEEP_ID
          value: "${SWEEP_ID}"
        # Secret NAMES only — the container fetches the values from Secret
        # Manager at startup (run_baseline_and_sweep.sh), so the job spec
        # never carries plaintext keys.
        - name: GCP_PROJECT
          value: paligemma-scienceqa
        - name: WANDB_SECRET_NAME
          value: wandb-api-key
        - name: HF_SECRET_NAME
          value: hf-token
# Without an explicit serviceAccount the container runs as Google's managed
# custom-code agent, which has NO Secret Manager access (job 4472759288284053504
# died on 403s). The compute SA holds secretAccessor on wandb-api-key/hf-token.
serviceAccount: 581237630637-compute@developer.gserviceaccount.com
baseOutputDirectory:
  outputUriPrefix: gs://mlops-paligemma-west4/vertex-output/paligemma-lora
